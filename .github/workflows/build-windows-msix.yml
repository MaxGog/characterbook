name: Build Windows MSIX

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32.6'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: ${{ env.FLUTTER_VERSION }}
        cache: true
        cache-key: flutter-windows-${{ hashFiles('pubspec.yaml') }}
    
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build Windows
      run: flutter build windows --release
    
    - name: Create MSIX package
      run: |
        # Убираем windows-sdk установку, используем то что есть
        flutter pub run msix:create --config msix_config.yaml
        
        # Проверяем результат
        if (Test-Path "build/windows/msix/*.msix") {
          echo "✅ MSIX создан успешно!"
          Get-ChildItem build/windows/msix/*.msix
        } else {
          echo "❌ MSIX не создан"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: characterbook-windows-msix
        path: build/windows/msix/*.msix
        if-no-files-found: error
        retention-days: 30